<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNDOCHEM 관제시스템 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #0b1120; }
        
        /* 반투명 유리 효과 (Glassmorphism) */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl relative z-10 mx-4">
        
        <div class="text-center mb-8 flex flex-col items-center">
            <div class="bg-blue-900/50 w-16 h-16 rounded-full flex items-center justify-center mb-4 border border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                <i class="fas fa-shield-alt text-2xl text-blue-400"></i>
            </div>
            <h1 class="text-3xl font-black text-white tracking-widest">SUNDOCHEM</h1>
            <p class="text-slate-400 text-sm mt-2 tracking-widest">스마트 팩토리 통합 관제시스템</p>
        </div>

        <div class="flex flex-col gap-4">
            <div>
                <label class="block text-slate-400 text-xs font-bold mb-1 ml-1 tracking-wider">아이디</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="login-id" placeholder="ID를 입력하세요" 
                           class="w-full bg-[#0f172a] border border-slate-600 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-slate-400 text-xs font-bold mb-1 ml-1 tracking-wider">비밀번호</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" 
                           class="w-full bg-[#0f172a] border border-slate-600 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                           onkeypress="if(event.keyCode===13) checkLogin()"> </div>
            </div>

            <p id="error-msg" class="text-rose-500 text-xs font-bold text-center h-4 opacity-0 transition-opacity">아이디 또는 비밀번호가 틀렸습니다.</p>

            <button onclick="checkLogin()" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-black tracking-widest py-3 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all mt-2 active:scale-95">
                SYSTEM LOGIN
            </button>
        </div>
    </div>

    <script>
        function checkLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            const errorMsg = document.getElementById('error-msg');

            // 🍒 [보안 세팅 구역] 🍒
            // 창우님! 깃허브에 올리기 직전에 아래 'sundo'와 '1234'를 진짜 아이디/비번으로 수정하세요!
            const correctID = "sundo"; 
            const correctPW = "1234";

            if (id === correctID && pw === correctPW) {
                // 💡 [핵심] 로그인 성공 시 'VIP 출입증' 발급!
                sessionStorage.setItem('sundo_auth', 'true'); 
                
                errorMsg.style.opacity = '0';
                window.location.href = 'dashboard.html';
            } else {
                // 로그인 실패! (에러 메시지 띄우고 박스 흔들기)
                errorMsg.style.opacity = '1';
                
                const panel = document.querySelector('.glass-panel');
                panel.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 400 });
            }
        }
    </script>
</body>
</html>
